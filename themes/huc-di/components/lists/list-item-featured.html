<li class="bg-[#49dacb] rounded-sm flex">
  <a href="{{path}}" class=" flex flex-col md:flex-row no-underl">
    <div class="w-full md:w-1/2 bg-[#eae6dc]"><img src="images/{{featured_image}}" alt="" class="w-full max-h-96 object-cover"></div>
    <div class="w-full md:w-1/2 flex flex-col gap-4 p-4 no-underl">
      <h3 class="text-lg">{{title}}</h3>
      <div>{{summary}}</div>
    </div>
  </a>
</li>
